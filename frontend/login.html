<!DOCTYPE html>
<html lang="pt-BR" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar - AtenaAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            50: '#eef2ff',
                            100: '#e0e7ff',
                            200: '#c7d2fe',
                            300: '#a5b4fc',
                            400: '#818cf8',
                            500: '#6366f1',
                            600: '#4f46e5',
                            700: '#4338ca',
                            800: '#3730a3',
                            900: '#312e81',
                        }
                    }
                }
            }
        }
        
        // Check for saved theme preference
        if (localStorage.getItem('theme') === 'dark' || 
            (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
        
        // Atualizar logos conforme o tema ao carregar a página
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof updateAllLogos === 'function') {
                updateAllLogos();
            }
        });
    </script>
</head>

    <body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-200">
        <!-- Header -->
        <header class="border-b border-gray-200 dark:border-gray-700 py-3 px-4 flex justify-between items-center">
            <!-- Logo e Beta -->
            <div class="flex items-center">
                <a href="index.html" class="flex items-center text-2xl font-semibold leading-tight text-gray-900 dark:text-gray-100">
                    <img src="assets/logo/logo-icon-ligth.png" alt="Logo AtenaAI" class="h-9 w-9 mr-2" data-theme-logo>
                    AtenaAI
                </a>
                <span class="ml-2 px-2 py-1 text-xs bg-blue-100 dark:bg-blue-900 text-blue-800 dark:text-blue-200 rounded-full">
                    Beta
                </span>
            </div>

            <!-- Botões e Links -->
            <div class="flex items-center space-x-4">
                <!-- Botão de tema -->
                <button id="theme-toggle" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800">
                    <!-- Ícone claro -->
                    <svg id="light-icon" class="w-5 h-5 hidden dark:block" fill="currentColor" viewBox="0 0 20 20">
                        <path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"/>
                    </svg>
                    <!-- Ícone escuro -->
                    <svg id="dark-icon" class="w-5 h-5 block dark:hidden" fill="currentColor" viewBox="0 0 20 20">
                        <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/>
                    </svg>
                </button>

                <!-- Links de navegação -->
                <a href="quem-somos.html" class="text-sm font-medium hover:underline">
                    Quem somos
                </a>

                <a href="login.html" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-md text-sm font-medium">
                    Entrar
                </a>

                <a href="cadastro.html" class="bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 text-gray-800 dark:text-gray-200 px-4 py-2 rounded-md text-sm font-medium">
                    Criar Conta
                </a>
            </div>
        </header>

        <div class="min-h-screen flex flex-col items-center justify-center p-4">
            <div class="w-full max-w-md">
                <div class="text-center mb-8">
                    <p class="text-gray-600 dark:text-gray-400">Entre na sua conta</p>
                </div>
                
                    <div class="bg-white dark:bg-gray-800 rounded-lg shadow-md p-6 border border-gray-200 dark:border-gray-700">
                    <div class="space-y-5">
                        <button 
                        id="google-signup"
                        class="w-full flex items-center justify-center gap-3 bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 hover:bg-gray-50 dark:hover:bg-gray-600 text-gray-800 dark:text-white py-2.5 px-4 rounded-md font-medium transition-colors"
                        >
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                            </svg>
                            Continuar com Google
                        </button>
                        
                        <button
                        id="facebook-signup"
                        class="w-full flex items-center justify-center gap-3 bg-[#1877F2] hover:bg-[#166fe5] text-white py-2.5 px-4 rounded-md font-medium transition-colors"
                        >
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                            </svg>
                            Continuar com Facebook
                        </button>
                        <div class="flex items-center my-4">
                            <div class="flex-grow h-px bg-gray-300 dark:bg-gray-600"></div>
                            <span class="px-4 text-sm text-gray-500 dark:text-gray-400">ou</span>
                            <div class="flex-grow h-px bg-gray-300 dark:bg-gray-600"></div>
                        </div>
                        
                        <!-- SUBSTITUA APENAS O FORM -->
                        <form id="login-form" class="space-y-4" novalidate>
                            <div>
                                <label class="block text-sm font-medium mb-1">Email</label>
                                <input 
                                    type="email"
                                    name="email"
                                    class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 focus:ring-2 focus:ring-primary-500"
                                    placeholder="seu@email.com"
                                >
                            </div>

                            <div class="relative">
    <input
        id="password"
        type="password"
        name="password"
        class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 focus:ring-2 focus:ring-primary-500"
        placeholder="••••••••"
    >

    <button type="button" id="toggle-password" class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-500 dark:text-gray-400 focus:outline-none">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" id="eye-icon">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
            </svg>
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" id="eye-off-icon">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
            </svg>
            <span class="sr-only">Mostrar/ocultar senha</span>
                                </button>

    </div>

                            <button
    type="submit"
    id="login-btn"
    class="w-full bg-primary-600 hover:bg-primary-700 text-white py-2.5 px-4 rounded-md font-medium flex justify-center items-center gap-2"
    >
    <span id="login-btn-text">Entrar</span>
    <svg
        id="login-spinner"
        class="hidden animate-spin h-5 w-5 text-white"
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
    >
        <circle class="opacity-25" cx="12" cy="12" r="10"
        stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor"
        d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
    </svg>
    </button>

                        </form>

                    </div>
                    
                    <div class="mt-6 text-center">
                        <p class="text-sm">
                            Não tem uma conta? 
                            <a href="cadastro.html" class="text-primary-600 hover:text-primary-500 hover:underline font-medium">Criar conta</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>


        <!-- TOAST -->
        <div id="toast" class="fixed top-5 right-5 z-50 hidden">
            <div class="flex items-start gap-3 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg shadow-lg p-4 w-80">
                <div id="toast-icon"
                    class="flex-shrink-0 w-8 h-8 flex items-center justify-center rounded-full bg-red-100 text-red-600">❌</div>
                <div class="flex-1">
                    <p id="toast-title" class="font-semibold text-sm text-gray-900 dark:text-white"></p>
                    <p id="toast-message" class="text-sm text-gray-600 dark:text-gray-300"></p>
                </div>
            </div>
        </div>

        <script type="module" src="js/ui.js"></script>
        <script type="module" src="js/api.js"></script>
        <script type="module" src="js/auth.js"></script>
        <script type="module" src="js/login.js"></script>
        <script type="module" src="js/register.js"></script>
</body>
</html>
