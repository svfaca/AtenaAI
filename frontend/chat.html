<!DOCTYPE html>
<html lang="pt-BR" class="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AtenaAI — Chat</title>

<!-- Favicon -->
<link rel="icon" type="image/x-icon" href="assets/logo/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="assets/logo/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="assets/logo/favicon-16x16.png">
<link rel="apple-touch-icon" href="assets/logo/apple-touch-icon.png">

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script>
// 🔐 VERIFICADOR DE AUTENTICAÇÃO
function checkAuthAndRedirect() {
  const token = localStorage.getItem('access_token');
  if (!token) {
    window.location.href = 'index.html';
  }
}

// Verificar ao carregar
document.addEventListener('DOMContentLoaded', checkAuthAndRedirect);

tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      fontFamily: { sans: ['Inter'] }
    }
  }
};

// Verificar tema salvo
if (localStorage.getItem('theme') === 'dark' || 
    (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
    document.documentElement.classList.add('dark');
} else {
    document.documentElement.classList.remove('dark');
}

// Atualizar logos conforme o tema ao carregar a página
document.addEventListener('DOMContentLoaded', function() {
    if (typeof updateAllLogos === 'function') {
        updateAllLogos();
    }
});
</script>

<style>
.chat-container {
  height: calc(100vh - 180px);
}
.message {
  max-width: 85%;
  animation: fadeIn .25s ease-in-out;
}
@keyframes fadeIn {
  from { opacity:0; transform:translateY(8px); }
  to { opacity:1; transform:translateY(0); }
}
.typing-indicator span {
  animation: blink 1.4s infinite both;
}
.typing-indicator span:nth-child(2){animation-delay:.2s}
.typing-indicator span:nth-child(3){animation-delay:.4s}
@keyframes blink {
  0%{opacity:.2} 20%{opacity:1} 100%{opacity:.2}
}
.sidebar-collapsed {
  width: 4rem !important;
}
.sidebar-collapsed .sidebar-text {
  display: none;
}
</style>
</head>

<body class="bg-white dark:bg-gray-900 text-gray-800 dark:text-gray-200">

<div class="flex h-screen">

<!-- SIDEBAR -->
<aside id="sidebar"
  class="w-64 transition-all duration-300 bg-gray-100 dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 flex flex-col">

  <!-- PERFIL -->
  <div class="p-4 border-b border-gray-200 dark:border-gray-700 flex items-center gap-3">
    
    <!-- FOTO / AVATAR -->
    <div id="user-avatar"
      class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center text-white font-semibold">
      S
    </div>

    <div class="sidebar-text flex-1">
      <p id="user-name" class="font-semibold">Minha Conta</p>
      <p id="user-role" class="text-sm text-gray-500" data-i18n="auth.student">Estudante</p>
    </div>

    <button id="sidebar-toggle"
      class="p-2 rounded hover:bg-gray-200 dark:hover:bg-gray-700">
      ☰
    </button>
  </div>

  <!-- CONVERSAS -->
  <div class="flex-1 overflow-y-auto p-3 space-y-3">

    <div class="flex items-center justify-between sidebar-text">
      <p class="text-xs uppercase text-gray-500">Conversas</p>
      <button id="new-conversation"
        class="text-xs text-blue-600 hover:underline">
        + Nova
      </button>
    </div>

    <!-- LISTA DINÂMICA -->
    <ul id="conversation-list" class="space-y-1">
      <!-- JS injeta aqui -->
    </ul>

  </div>

  <!-- FOOTER -->
  <div class="p-3 border-t border-gray-200 dark:border-gray-700 space-y-2">
    <button class="w-full text-left text-sm hover:underline sidebar-text">
      Configurações
    </button>

    <button id="logout-btn"
      class="w-full text-left text-sm text-red-500 hover:underline sidebar-text">
      Sair
    </button>
  </div>
</aside>


<!-- CHAT -->
<div class="flex-1 flex flex-col">

<header class="border-b border-gray-200 dark:border-gray-700 py-3 px-4 flex justify-between items-center">
  <div class="flex items-center">
    <a href="chat.html" class="flex items-center text-xl font-semibold hover:underline">
      <img src="assets/logo/logo-icon-ligth.png" alt="Logo AtenaAI" class="h-9 w-9 mr-2" data-theme-logo>
      AtenaAI
    </a>
    <span class="ml-2 px-2 py-1 text-xs bg-blue-100 dark:bg-blue-900 text-blue-800 dark:text-blue-200 rounded-full">
      Beta
    </span>
  </div>

  <div class="flex items-center space-x-4">
    <button id="theme-toggle" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800">
      <svg id="light-icon" class="w-5 h-5 hidden dark:block" fill="currentColor" viewBox="0 0 20 20">
        <path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"/>
      </svg>
      <svg id="dark-icon" class="w-5 h-5 block dark:hidden" fill="currentColor" viewBox="0 0 20 20">
        <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/>
      </svg>
    </button>
    <a href="quem-somos.html" class="text-sm font-medium hover:underline">Quem somos</a>
  </div>
</header>

<div id="chat-messages" class="chat-container flex-1 overflow-y-auto p-6 space-y-6">
  <div class="flex items-start">
    <div class="max-w-[75%] bg-white dark:bg-gray-800 p-4 rounded-2xl rounded-tl-sm shadow-sm">
      <p>Olá! Sou a AtenaAI. Como posso ajudar nos seus estudos hoje?</p>
    </div>
  </div>
</div>


<!-- INPUT -->
<div class="border-t border-gray-200 dark:border-gray-700 p-4">
  <form id="chat-form" class="flex gap-2">
    <textarea id="user-input" rows="1"
      class="flex-1 bg-gray-100 dark:bg-gray-800 rounded-lg p-3 resize-none outline-none"
      placeholder="Envie uma mensagem..."></textarea>

    <button type="submit"
      class="bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-lg">
      ➤
    </button>
  </form>

  <div class="text-xs text-center text-gray-500 mt-2">
    Área autenticada — histórico salvo
  </div>
</div>

</div>
</div>

<script type="module" src="js/auth.js"></script>
<script type="module" src="js/guard.js"></script>

<script type="module" src="js/api.js"></script>
<script type="module" src="js/ui.js"></script>

<script type="module" src="js/chat-page.js"></script>


</body>
</html>
